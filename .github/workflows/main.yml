name: Market Briefing Bot

on:
  schedule:
    # --- 月曜日専用 ---
    # 日本時間 月曜 AM 7:00 (UTC 日曜 22:00)
    - cron: '0 22 * * 0'
    # 日本時間 月曜 PM 4:00 (UTC 月曜 07:00)
    - cron: '0 7 * * 1'
    # 日本時間 月曜 PM 9:00 (UTC 月曜 12:00)
    - cron: '0 12 * * 1'

    # --- 火曜日〜金曜日用 ---
    # 日本時間 AM 7:00 (UTC 前日 22:00)
    - cron: '0 22 * * 1-4'
    # 日本時間 PM 6:00 (UTC 当日 09:00)
    - cron: '0 9 * * 2-5'
    # 日本時間 PM 9:00 (UTC 当日 12:00)
    - cron: '0 12 * * 2-5'

  workflow_dispatch:
# Node.js 20の警告を消すための設定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Bot
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python bot.py
